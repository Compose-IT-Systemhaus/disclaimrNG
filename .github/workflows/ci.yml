name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-24.04
    env:
      DJANGO_SECRET_KEY: ci-only-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      # python-ldap doesn't need a real server for these tests — the LDAP
      # helper is mocked out. SQLite is fine for the rest.
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for python-ldap + lxml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libldap2-dev libsasl2-dev libssl-dev \
            libxml2-dev libxslt1-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}

      - name: Install project + test deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v --tb=short

  docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Hard-coded lowercase — GHCR rejects mixed case in image
          # paths and the org slug ``Compose-IT-Systemhaus`` would
          # otherwise sneak through.
          images: ghcr.io/compose-it-systemhaus/disclaimrng
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=auto

      - name: Log in to GHCR
        # Only push from master pushes and tags; PR builds stay local
        # (forks don't have package-write permission anyway).
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image (PR / non-push runs only)
        if: github.event_name != 'push'
        run: |
          tag=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=* \
            -e DATABASE_URL=sqlite:///:memory: \
            "$tag" python -c "import django, disclaimrweb.settings; print(django.get_version())"
