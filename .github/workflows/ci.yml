name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-24.04
    env:
      DJANGO_SECRET_KEY: ci-only-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      # python-ldap doesn't need a real server for these tests — the LDAP
      # helper is mocked out. SQLite is fine for the rest.
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps for python-ldap + lxml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libldap2-dev libsasl2-dev libssl-dev \
            libxml2-dev libxslt1-dev

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}

      - name: Install project + test deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v --tb=short

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: disclaimrng:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=* \
            -e DATABASE_URL=sqlite:///:memory: \
            disclaimrng:ci python -c "import django, disclaimrweb.settings; print(django.get_version())"
