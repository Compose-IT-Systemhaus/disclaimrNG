name: disclaimrng

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-disclaimr}
      POSTGRES_USER: ${POSTGRES_USER:-disclaimr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, see .env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/compose-it-systemhaus/disclaimrng:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    command: ["web"]

  milter:
    image: ghcr.io/compose-it-systemhaus/disclaimrng:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    env_file: .env
    ports:
      - "5000:5000"
    command: ["milter"]

volumes:
  pgdata:
  staticfiles:
  media:
