name: disclaimrng

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-disclaimr}
      POSTGRES_USER: ${POSTGRES_USER:-disclaimr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, see .env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/compose-it-systemhaus/disclaimrng:dev
    # Build from the local repo if the image isn't in the registry yet.
    # Once CI publishes the image to GHCR you can switch this to
    # ``pull_policy: missing`` (or remove it) to prefer the registry.
    pull_policy: build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      # Uploaded signature images live here; the milter container needs
      # read access so it can resolve image URLs at send time. Override the
      # bind path with MEDIA_HOST_PATH if you'd rather use a host directory
      # (handy for backups/rsync from the host).
      - ${MEDIA_HOST_PATH:-media}:/app/media
    command: ["web"]

  milter:
    # Same image as web — the build is cached so this doesn't double the
    # build time, and pull_policy: build keeps Compose from trying to
    # fetch from GHCR.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/compose-it-systemhaus/disclaimrng:dev
    pull_policy: build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ${MEDIA_HOST_PATH:-media}:/app/media:ro
    command: ["milter"]

volumes:
  pgdata:
  staticfiles:
  media:
